bio: |
  PhD candidate in the Quest research group (Prof. Oded Zilberberg) at the
  University of Konstanz, working on non-equilibrium physics from nonlinear
  (quantum) resonators to many-body systems. On the side I enjoy coding and
  contributing to scientific open-source software.

